# ==============================================================
# GitHub Actions — CI/CD para Terraform
#
# Workflow:
#   PR aberto      → terraform fmt check + validate + plan (dev)
#   Push em main   → terraform apply automático em dev
#   Release tag    → terraform plan em prod (apply manual)
#
# Secrets necessários no repositório:
#   AWS_ACCESS_KEY_ID     — chave de acesso AWS
#   AWS_SECRET_ACCESS_KEY — chave secreta AWS
# ==============================================================

name: "Terraform CI/CD"

on:
  push:
    branches: ["main"]
    paths:
      - "terraform/**"
  pull_request:
    branches: ["main"]
    paths:
      - "terraform/**"

env:
  TF_VERSION: "1.5.7"
  AWS_REGION: "us-west-2"

permissions:
  contents: read
  pull-requests: write   # para comentar o plan no PR

jobs:
  # ============================================================
  # JOB 1: Validação — roda em todo PR e push
  # ============================================================
  validate:
    name: "Validar e formatar"
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout do código"
        uses: actions/checkout@v4

      - name: "Instalar Terraform ${{ env.TF_VERSION }}"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: "Verificar formatação (terraform fmt)"
        run: terraform fmt -check -recursive terraform/

      - name: "Inicializar sem backend (validação local)"
        working-directory: terraform/environments/dev
        run: terraform init -backend=false -input=false

      - name: "Validar sintaxe"
        working-directory: terraform/environments/dev
        run: terraform validate

      - name: "Análise de segurança com Checkov"
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform/
          framework: terraform
          quiet: true
          soft_fail: true   # não bloqueia o pipeline, apenas avisa

  # ============================================================
  # JOB 2: Plan do Dev — roda em PRs
  # Comenta o plano no PR para revisão
  # ============================================================
  plan-dev:
    name: "Plan Dev"
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'pull_request'
    environment: dev

    steps:
      - name: "Checkout do código"
        uses: actions/checkout@v4

      - name: "Configurar credenciais AWS"
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: "Instalar Terraform"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: "Criar terraform.tfvars"
        working-directory: terraform/environments/dev
        run: |
          cat > terraform.tfvars << 'EOF'
          project_name          = "cal"
          environment           = "dev"
          aws_region            = "us-west-2"
          vpc_cidr              = "10.1.0.0/16"
          azs                   = ["us-west-2a", "us-west-2b"]
          public_subnet_cidrs   = ["10.1.1.0/24", "10.1.2.0/24"]
          private_subnet_cidrs  = ["10.1.11.0/24", "10.1.12.0/24"]
          database_subnet_cidrs = ["10.1.21.0/24", "10.1.22.0/24"]
          single_nat_gateway    = true
          enable_vpc_endpoints  = true
          flow_log_traffic_type = "REJECT"
          flow_log_retention_days = 7
          app_port              = 8080
          bastion_allowed_cidrs = ["10.0.0.0/8"]
          EOF

      - name: "Terraform Init"
        working-directory: terraform/environments/dev
        run: terraform init -input=false

      - name: "Terraform Plan"
        id: plan
        working-directory: terraform/environments/dev
        run: terraform plan -no-color -input=false 2>&1 | tee plan_output.txt
        continue-on-error: true

      - name: "Comentar plan no PR"
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const planOutput = fs.readFileSync('terraform/environments/dev/plan_output.txt', 'utf8');
            const truncated = planOutput.length > 60000 ? planOutput.substring(0, 60000) + '\n...(output truncado)' : planOutput;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 📋 Terraform Plan — Dev\n\`\`\`hcl\n${truncated}\n\`\`\``
            });

  # ============================================================
  # JOB 3: Apply Dev — executa automaticamente após merge em main
  # ============================================================
  apply-dev:
    name: "Apply Dev"
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: dev

    steps:
      - name: "Checkout do código"
        uses: actions/checkout@v4

      - name: "Configurar credenciais AWS"
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: "Instalar Terraform"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: "Criar terraform.tfvars"
        working-directory: terraform/environments/dev
        run: |
          cat > terraform.tfvars << 'EOF'
          project_name          = "cal"
          environment           = "dev"
          aws_region            = "us-west-2"
          vpc_cidr              = "10.1.0.0/16"
          azs                   = ["us-west-2a", "us-west-2b"]
          public_subnet_cidrs   = ["10.1.1.0/24", "10.1.2.0/24"]
          private_subnet_cidrs  = ["10.1.11.0/24", "10.1.12.0/24"]
          database_subnet_cidrs = ["10.1.21.0/24", "10.1.22.0/24"]
          single_nat_gateway    = true
          enable_vpc_endpoints  = true
          flow_log_traffic_type = "REJECT"
          flow_log_retention_days = 7
          app_port              = 8080
          bastion_allowed_cidrs = ["10.0.0.0/8"]
          EOF

      - name: "Terraform Init"
        working-directory: terraform/environments/dev
        run: terraform init -input=false

      - name: "Terraform Plan"
        working-directory: terraform/environments/dev
        run: terraform plan -out=tfplan -input=false

      - name: "Terraform Apply"
        working-directory: terraform/environments/dev
        run: terraform apply -auto-approve tfplan

  # ============================================================
  # JOB 4: Plan Prod — roda manualmente via workflow_dispatch
  # ou em push de tag v* (ex: v1.0.0)
  # Apply em prod é SEMPRE manual — nunca automático
  # ============================================================
  plan-prod:
    name: "Plan Prod (revisão manual)"
    runs-on: ubuntu-latest
    needs: validate
    if: startsWith(github.ref, 'refs/tags/v')
    environment: prod

    steps:
      - name: "Checkout do código"
        uses: actions/checkout@v4

      - name: "Configurar credenciais AWS"
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: "Instalar Terraform"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: "Criar terraform.tfvars de prod"
        working-directory: terraform/environments/prod
        run: |
          cat > terraform.tfvars << 'EOF'
          project_name          = "cal"
          environment           = "prod"
          aws_region            = "us-west-2"
          vpc_cidr              = "10.0.0.0/16"
          azs                   = ["us-west-2a", "us-west-2b", "us-west-2c"]
          public_subnet_cidrs   = ["10.0.1.0/24", "10.0.2.0/24", "10.0.3.0/24"]
          private_subnet_cidrs  = ["10.0.11.0/24", "10.0.12.0/24", "10.0.13.0/24"]
          database_subnet_cidrs = ["10.0.21.0/24", "10.0.22.0/24", "10.0.23.0/24"]
          single_nat_gateway    = false
          enable_vpc_endpoints  = true
          flow_log_traffic_type = "ALL"
          flow_log_retention_days = 90
          app_port              = 8080
          bastion_allowed_cidrs = ["10.0.0.0/8"]
          EOF

      - name: "Terraform Init"
        working-directory: terraform/environments/prod
        run: terraform init -input=false

      - name: "Terraform Plan"
        working-directory: terraform/environments/prod
        run: |
          terraform plan -no-color -input=false 2>&1 | tee plan_prod.txt
          echo ""
          echo "======================================================"
          echo "ATENÇÃO: Revisar o plan acima antes de aplicar em prod."
          echo "Para aplicar: terraform apply manualmente no servidor."
          echo "======================================================"

      - name: "Upload do plan como artefato"
        uses: actions/upload-artifact@v4
        with:
          name: "terraform-plan-prod-${{ github.sha }}"
          path: terraform/environments/prod/plan_prod.txt
          retention-days: 30
